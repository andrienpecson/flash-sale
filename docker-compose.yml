services:
  redis:
    image: redis:7-alpine
    container_name: flash-sale-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: flash-sale-backend
    # Supabase creds + ACTIVE_SALE_ID from backend/.env (gitignored).
    env_file:
      - ./backend/.env
    environment:
      # Talk to the redis container, not localhost.
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        # Backend URL the browser calls — set at build time.
        VITE_API_BASE_URL: http://localhost:3000
    container_name: flash-sale-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
